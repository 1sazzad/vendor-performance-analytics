<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Vendor Performance Analytics - System Architecture</title>
  <desc id="desc">Diagram showing flow from CSV files to ingestion, SQLite raw tables, transformation, curated summary, and dashboard or notebooks, with logging outputs.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .db { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .log { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 10; }
      .label { font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .muted-arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowheadMuted); }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0f172a" />
    </marker>
    <marker id="arrowheadMuted" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="40" y="52">Vendor Performance Analytics — System Architecture</text>
  <text class="subtitle" x="40" y="80">Batch analytics pipeline from raw CSV ingestion to curated vendor performance insights</text>

  <!-- Layer bands -->
  <rect class="layer" x="40" y="110" width="1200" height="120" />
  <text class="label" x="60" y="140">1) Ingestion Layer</text>

  <rect class="layer" x="40" y="250" width="1200" height="150" />
  <text class="label" x="60" y="280">2) Storage + Transformation Layer</text>

  <rect class="layer" x="40" y="420" width="1200" height="170" />
  <text class="label" x="60" y="450">3) Serving / Consumption Layer</text>

  <rect class="layer" x="40" y="610" width="1200" height="110" />
  <text class="label" x="60" y="640">4) Observability Layer</text>

  <!-- Ingestion -->
  <rect class="box" x="90" y="155" width="240" height="55" />
  <text class="label" x="115" y="188">Raw CSV files (data/)</text>

  <rect class="box" x="390" y="145" width="300" height="75" />
  <text class="label" x="420" y="176">ingestion_db.py</text>
  <text class="text" x="420" y="198">Chunked CSV → SQL table loads</text>

  <!-- Storage + transform -->
  <rect class="db" x="260" y="300" width="300" height="75" />
  <text class="label" x="290" y="330">SQLite: inventory.db</text>
  <text class="text" x="290" y="352">Raw tables: purchases, sales, ...</text>

  <rect class="box" x="640" y="300" width="300" height="75" />
  <text class="label" x="670" y="330">get_vendor_summary.py</text>
  <text class="text" x="670" y="352">CTEs + KPI metric enrichment</text>

  <rect class="db" x="980" y="300" width="220" height="75" />
  <text class="label" x="1005" y="330">Curated table</text>
  <text class="text" x="1005" y="352">vendor_sales_summary</text>

  <!-- Serving -->
  <rect class="box" x="180" y="485" width="270" height="75" />
  <text class="label" x="215" y="515">Streamlit app (app.py)</text>
  <text class="text" x="215" y="537">Filters, KPIs, charts, explorer</text>

  <rect class="box" x="520" y="485" width="260" height="75" />
  <text class="label" x="560" y="515">Notebooks / SQL</text>
  <text class="text" x="560" y="537">EDA and ad-hoc analytics</text>

  <rect class="box" x="850" y="485" width="300" height="75" />
  <text class="label" x="875" y="515">Fallback CSV</text>
  <text class="text" x="875" y="537">data/vendor_sales_summary.csv</text>

  <!-- Observability -->
  <rect class="log" x="320" y="655" width="280" height="45" />
  <text class="text" x="340" y="683">logs/ingestion_db.log</text>

  <rect class="log" x="700" y="655" width="310" height="45" />
  <text class="text" x="720" y="683">logs/get_vendor_summary.log</text>

  <!-- Arrows -->
  <path class="arrow" d="M330 182 L390 182" />
  <path class="arrow" d="M540 220 L410 300" />
  <path class="arrow" d="M560 338 L640 338" />
  <path class="arrow" d="M940 338 L980 338" />

  <path class="arrow" d="M1090 375 L1090 485" />
  <path class="arrow" d="M1090 522 L450 522" />
  <path class="muted-arrow" d="M1090 522 L780 522" />

  <path class="muted-arrow" d="M450 182 L450 655" />
  <path class="muted-arrow" d="M790 338 L790 655" />
</svg>
