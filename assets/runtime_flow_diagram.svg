<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">End-to-End Runtime Flow</title>
  <desc id="desc">Operational flow: run ingestion, build summary, launch dashboard, consume metrics.</desc>
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .step { fill:#ffffff; stroke:#64748b; stroke-width:2; rx:12; }
      .title { font:700 24px Arial, sans-serif; fill:#0f172a; }
      .label { font:600 14px Arial, sans-serif; fill:#0f172a; }
      .desc { font:500 12px Arial, sans-serif; fill:#334155; }
      .arrow { stroke:#0f172a; stroke-width:2.5; fill:none; marker-end:url(#a); }
      .num { font:700 14px Arial, sans-serif; fill:#ffffff; }
      .badge { fill:#0f172a; }
    </style>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#0f172a"/></marker>
  </defs>
  <rect class="bg" width="1120" height="360"/>
  <text class="title" x="30" y="42">Operational Runtime Flow (User-Friendly Sequence)</text>

  <rect class="step" x="40" y="110" width="240" height="110"/>
  <circle class="badge" cx="60" cy="130" r="14"/><text class="num" x="56" y="135">1</text>
  <text class="label" x="82" y="132">Run ingestion_db.py</text>
  <text class="desc" x="82" y="154">Reads CSV files from data/</text>
  <text class="desc" x="82" y="172">Writes raw SQLite tables</text>

  <rect class="step" x="320" y="110" width="240" height="110"/>
  <circle class="badge" cx="340" cy="130" r="14"/><text class="num" x="336" y="135">2</text>
  <text class="label" x="362" y="132">Run get_vendor_summary.py</text>
  <text class="desc" x="362" y="154">Aggregates + cleans data</text>
  <text class="desc" x="362" y="172">Creates vendor_sales_summary</text>

  <rect class="step" x="600" y="110" width="240" height="110"/>
  <circle class="badge" cx="620" cy="130" r="14"/><text class="num" x="616" y="135">3</text>
  <text class="label" x="642" y="132">Launch app.py (Streamlit)</text>
  <text class="desc" x="642" y="154">Loads curated summary table</text>
  <text class="desc" x="642" y="172">Applies filters and charts</text>

  <rect class="step" x="880" y="110" width="200" height="110"/>
  <circle class="badge" cx="900" cy="130" r="14"/><text class="num" x="896" y="135">4</text>
  <text class="label" x="922" y="132">Consume insights</text>
  <text class="desc" x="922" y="154">Dashboard KPIs</text>
  <text class="desc" x="922" y="172">Notebook / SQL analysis</text>

  <path class="arrow" d="M280 165 L320 165"/>
  <path class="arrow" d="M560 165 L600 165"/>
  <path class="arrow" d="M840 165 L880 165"/>
</svg>
